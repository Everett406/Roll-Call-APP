name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write  # 允许创建 Release
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests (optional)
        run: flutter test || true

      - name: Read version from pubspec.yaml
        id: read-version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: roll-call-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 如果是 push 到 main/master，额外创建 GitHub Release
      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.read-version.outputs.version }}+${{ steps.read-version.outputs.build }}
          name: 点到为止 v${{ steps.read-version.outputs.version }} Build #${{ github.run_number }}
          body: |
            自动构建的 APK 安装包。
            构建时间：${{ github.event.head_commit.timestamp }}
            提交信息：${{ github.event.head_commit.message }}
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
